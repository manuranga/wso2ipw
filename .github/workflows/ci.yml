name: CI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DISPLAY: ':99'
      WSO2IPW_ELECTRON_ARGS: '--no-sandbox'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 libgbm1 libnss3 libxss1 libasound2t64 \
            libx11-xcb1 libdrm2 libxcomposite1 libxdamage1 \
            libxrandr2 libatk-bridge2.0-0 libatspi2.0-0 libcups2

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

      - name: Download WSO2 Integrator
        run: |
          VERSION="5.0.0-alpha6"
          TARBALL="wso2-integrator-${VERSION}-linux-x64.tar.gz"
          URL="https://github.com/wso2/product-integrator/releases/download/v${VERSION}/${TARBALL}"
          curl -fSL -o "$TARBALL" "$URL"
          tar -xzf "$TARBALL"
          BINARY=$(find . -maxdepth 2 -name 'wso2-integrator' -type f ! -path '*/bin/*' | head -1)
          chmod +x "$BINARY"
          echo "WSO2_INTEGRATOR_PATH=$(realpath $BINARY)" >> "$GITHUB_ENV"

      - name: Install wso2ipw from source
        run: |
          npm install
          npm link

      - name: Run smoke test
        run: |
          EXAMPLES="$(npm root -g)/wso2ipw/examples/hello-world-service"
          for step in "$EXAMPLES"/0*.sh; do
            name=$(basename "$step")
            echo ""
            echo "═══ $name ═══"
            bash "$step" || {
              echo "FAIL: $name" >&2
              wso2ipw screenshot "failure-${name%.sh}.png" 2>/dev/null || true
              wso2ipw close 2>/dev/null || true
              exit 1
            }
            echo "✓ $name"
          done
          echo ""
          echo "═══ SMOKE TEST PASSED ✓ ═══"
          wso2ipw close 2>/dev/null || true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-screenshots
          path: failure-*.png
          if-no-files-found: ignore

  publish:
    name: Publish to npm
    needs: smoke-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
