name: CI

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      os:
        description: 'OS to test (blank = all)'
        type: choice
        options: ['', 'ubuntu-latest', 'windows-latest']
        default: ''

permissions:
  contents: read

jobs:
  smoke-test:
    name: ${{ matrix.example }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: ${{ inputs.os && fromJSON(format('["{0}"]', inputs.os)) || fromJSON('["ubuntu-latest","windows-latest"]') }}
        example: [hello-world-service, icp]
        # exclude: none — ICP runs on both OSes
    env:
      DISPLAY: ':99'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 libgbm1 libnss3 libxss1 libasound2t64 \
            libx11-xcb1 libdrm2 libxcomposite1 libxdamage1 \
            libxrandr2 libatk-bridge2.0-0 libatspi2.0-0 libcups2

      - name: Start Xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

      - name: Download WSO2 Integrator (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION=$(curl -fsSL https://api.github.com/repos/wso2/product-integrator/releases/latest \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "Latest version: $VERSION"
          TARBALL="wso2-integrator-${VERSION}-linux-x64.tar.gz"
          URL="https://github.com/wso2/product-integrator/releases/download/v${VERSION}/${TARBALL}"
          curl -fSL -o "$TARBALL" "$URL"
          tar -xzf "$TARBALL"
          BINARY=$(find . -maxdepth 2 -name 'wso2-integrator' -type f ! -path '*/bin/*' | head -1)
          chmod +x "$BINARY"
          echo "WSO2_INTEGRATOR_PATH=$(realpath $BINARY)" >> "$GITHUB_ENV"

      - name: Download WSO2 Integrator (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $release = Invoke-RestMethod https://api.github.com/repos/wso2/product-integrator/releases/latest
          $version = $release.tag_name -replace '^v',''
          Write-Host "Latest version: $version"
          $msi = "wso2-integrator-${version}.msi"
          $url = "https://github.com/wso2/product-integrator/releases/download/v${version}/${msi}"
          Invoke-WebRequest -Uri $url -OutFile $msi
          # MSI fails with Error 1304 (MAX_PATH on deep Ballerina paths).
          # Install to short path via INTEGRATORFOLDER property.
          reg add 'HKLM\SYSTEM\CurrentControlSet\Control\FileSystem' /v LongPathsEnabled /t REG_DWORD /d 1 /f
          $installDir = 'C:\w\'
          $msiPath = Resolve-Path $msi
          $proc = Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /qn /norestart INTEGRATORFOLDER=`"$installDir`"" -Wait -PassThru
          Write-Host "msiexec exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) { throw "msiexec failed with exit code $($proc.ExitCode)" }
          $binary = Get-ChildItem $installDir -Recurse -Filter 'WSO2 Integrator.exe' -Depth 2 |
            Select-Object -First 1
          if (-not $binary) { throw 'WSO2 Integrator.exe not found after MSI install' }
          Write-Host "Binary: $($binary.FullName)"
          "WSO2_INTEGRATOR_PATH=$($binary.FullName)" | Out-File -Append $env:GITHUB_ENV

          # Windows Defender real-time scanning freezes Ballerina/JDK on cold runners
          Add-MpPreference -ExclusionPath $installDir
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\WSO2Integrator"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.ballerina"

      - name: Patch ICP script for dash compatibility (Linux)
        if: runner.os == 'Linux' && matrix.example == 'icp'
        run: |
          ICP_SH=$(dirname "$WSO2_INTEGRATOR_PATH")/components/icp/bin/icp.sh
          if [ -f "$ICP_SH" ]; then
            python3 - "$ICP_SH" <<'PYEOF'
          import re, sys
          path = sys.argv[1]
          with open(path) as f: s = f.read()
          s = s.replace('JAVA_OPTS=()', 'JAVA_OPTS=""')
          s = re.sub(r'JAVA_OPTS\+=\(\s*\n((?:\s+.*\n)*?\s*)\)',
              lambda m: 'JAVA_OPTS="$JAVA_OPTS ' + ' '.join(m.group(1).split()) + '"', s)
          s = s.replace('"${JAVA_OPTS[@]}"', '$JAVA_OPTS')
          with open(path, 'w') as f: f.write(s)
          print('Patched', path)
          PYEOF
          fi

      - name: Pre-pull ICP Ballerina modules (Linux)
        if: runner.os == 'Linux' && matrix.example == 'icp'
        run: |
          BAL=$(dirname "$WSO2_INTEGRATOR_PATH")/components/ballerina/bin/bal
          export JAVA_HOME=$(find $(dirname "$WSO2_INTEGRATOR_PATH")/components/dependencies -maxdepth 1 -name 'jdk-*' -type d | head -1)
          "$BAL" pull ballerinax/metrics.logs
          "$BAL" pull wso2/icp.runtime.bridge

      - name: Pre-pull ICP Ballerina modules (Windows)
        if: runner.os == 'Windows' && matrix.example == 'icp'
        shell: pwsh
        run: |
          $base = Split-Path $env:WSO2_INTEGRATOR_PATH
          $bal = Join-Path $base 'components\ballerina\bin\bal.bat'
          $env:JAVA_HOME = (Get-ChildItem (Join-Path $base 'components\dependencies') -Directory -Filter 'jdk-*' | Select-Object -First 1).FullName
          & $bal pull ballerinax/metrics.logs
          & $bal pull wso2/icp.runtime.bridge

      - name: Install wso2ipw from source
        run: |
          npm install
          npm link

      - name: Install Chrome for playwright-cli (ICP)
        if: matrix.example == 'icp'
        shell: bash
        run: |
          cd node_modules/@playwright/cli/node_modules/playwright-core
          npx playwright install --with-deps chrome

      - name: Run ${{ matrix.example }}
        shell: bash
        env:
          WSO2IPW_ELECTRON_ARGS: ${{ runner.os == 'Linux' && '--no-sandbox --password-store=basic' || '' }}
        run: bash "$(npm root -g)/wso2ipw/examples/${{ matrix.example }}/run-all.sh"

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.example }}-${{ matrix.os }}
          path: "*.png"
          if-no-files-found: ignore

  publish:
    name: Publish to npm
    needs: smoke-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
